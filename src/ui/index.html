<!DOCTYPE html>
<html lang="en" class="bg-gray-900">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Friendarr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    html { min-height: 100%; scrollbar-width: thin; scrollbar-color: #4b5563 #1f2937; }
    html:hover { scrollbar-color: #6b7280 #1f2937; }
    body { background-color: #111827; }
    .sidebar {
      background: linear-gradient(180deg, rgba(31,41,55,1) 0%, #131928 100%);
      border-right: 1px solid #374151;
    }
    input[type='text'], input[type='password'], input[type='number'], select, textarea {
      background-color: #374151; border: 1px solid #6b7280; border-radius: 0.375rem;
      color: white; padding: 0.5rem 0.75rem; font-size: 0.875rem; line-height: 1.25rem;
      width: 100%; min-width: 0; flex: 1 1 0%;
      transition: border-color 150ms ease-in-out;
    }
    input[type='text']:focus, input[type='password']:focus, input[type='number']:focus, select:focus, textarea:focus {
      outline: none; border-color: #6366f1; box-shadow: 0 0 0 1px #6366f1;
    }
    input[type='checkbox'] {
      height: 1.5rem; width: 1.5rem; border-radius: 0.375rem;
      color: #4f46e5; transition: 150ms ease-in-out;
    }
    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center;
      border: 1px solid #6366f1; border-radius: 0.375rem; font-weight: 500;
      padding: 0.5rem 1rem; font-size: 0.875rem; line-height: 1.25rem;
      color: white; background-color: rgba(79,70,229,0.8);
      transition: 150ms ease-in-out; cursor: pointer; white-space: nowrap;
    }
    .btn-primary:hover { background-color: #4f46e5; border-color: #6366f1; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost {
      display: inline-flex; align-items: center; justify-content: center;
      border: 1px solid #4b5563; border-radius: 0.375rem; font-weight: 500;
      padding: 0.5rem 1rem; font-size: 0.875rem; line-height: 1.25rem;
      color: #d1d5db; background-color: transparent;
      transition: 150ms ease-in-out; cursor: pointer; white-space: nowrap;
    }
    .btn-ghost:hover { color: white; border-color: #9ca3af; }
    .btn-danger {
      display: inline-flex; align-items: center; justify-content: center;
      border: 1px solid #ef4444; border-radius: 0.375rem; font-weight: 500;
      padding: 0.5rem 1rem; font-size: 0.875rem; line-height: 1.25rem;
      color: white; background-color: rgba(220,38,38,0.8);
      transition: 150ms ease-in-out; cursor: pointer; white-space: nowrap;
    }
    .btn-danger:hover { background-color: #dc2626; border-color: #ef4444; }
    .btn-sm { padding: 0.25rem 0.625rem; font-size: 0.75rem; line-height: 1rem; }
    .btn-xs { padding: 0.125rem 0.5rem; font-size: 0.75rem; line-height: 1rem; }
    .text-brand {
      background: linear-gradient(to bottom right, #818cf8, #c084fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    svg.icon { width: 1.25rem; height: 1.25rem; flex-shrink: 0; }
    svg.icon-sm { width: 1rem; height: 1rem; flex-shrink: 0; }
  </style>
</head>
<body class="text-white">
<div id="app" class="flex h-screen min-h-screen min-w-0 bg-gray-900">

  <!-- Sidebar -->
  <aside class="sidebar fixed bottom-0 left-0 top-0 z-30 flex w-64 flex-col">
    <div class="flex flex-1 flex-col overflow-y-auto pb-4">
      <div class="flex flex-shrink-0 items-center px-6 py-6">
        <span class="text-2xl font-bold"><span class="text-brand">Friendarr</span></span>
      </div>
      <nav class="mt-4 flex-1 space-y-1 px-3" id="nav">
        <a href="#" data-view="queue" class="nav-link group flex items-center rounded-md px-3 py-2.5 text-sm font-medium text-white transition duration-150 ease-in-out bg-gradient-to-br from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500">
          <svg class="icon mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
          Queue
        </a>
        <a href="#" data-view="settings" class="nav-link group flex items-center rounded-md px-3 py-2.5 text-sm font-medium text-gray-300 transition duration-150 ease-in-out hover:bg-gray-700 hover:text-white">
          <svg class="icon mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          Settings
        </a>
      </nav>
      <div class="px-4 py-3 border-t border-gray-700 mt-auto" id="auth-status">
        <div class="text-xs text-gray-500">Not authenticated</div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 ml-64 relative">
    <header class="sticky top-0 z-10 flex items-center justify-between h-16 px-6 border-b border-gray-700 bg-gray-900/80 backdrop-blur">
      <h2 class="text-xl font-bold text-gray-100" id="page-title">Queue</h2>
      <button onclick="showAuthModal()" class="btn-ghost btn-sm" id="auth-btn">
        <svg class="icon-sm mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
        Authenticate
      </button>
    </header>

    <div class="px-6 py-6 max-w-7xl" id="content"></div>
  </main>

</div>

<!-- Auth Modal -->
<div id="auth-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-gray-800/70">
  <div class="relative w-full max-w-md rounded-lg bg-gray-800 p-6 shadow-xl ring-1 ring-gray-700">
    <h3 class="text-brand text-xl font-bold mb-4">Authenticate</h3>
    <p class="text-sm text-gray-400 mb-4">Enter your master API key to manage the queue and settings.</p>
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-400 mb-1">Master API Key</label>
        <input type="password" id="auth-key-input" placeholder="sk-..." class="w-full">
      </div>
      <div class="flex justify-end gap-2">
        <button onclick="hideAuthModal()" class="btn-ghost">Cancel</button>
        <button onclick="authenticate()" class="btn-primary">Connect</button>
      </div>
      <div id="auth-error" class="text-sm text-red-500 hidden"></div>
    </div>
  </div>
</div>

<script>
// === State ===
let apiKey = localStorage.getItem('friendarr_key') || '';
let currentView = 'queue';
let queueTimer = null;
let settingsData = null;

// === Init ===
document.addEventListener('DOMContentLoaded', () => {
  if (apiKey) { updateAuthUI(true); }
  setupNav();
  showView(currentView);
});

// === Navigation ===
function setupNav() {
  document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const view = e.currentTarget.dataset.view;
      showView(view);
      document.querySelectorAll('.nav-link').forEach(l => {
        l.className = l.dataset.view === view
          ? 'nav-link group flex items-center rounded-md px-3 py-2.5 text-sm font-medium text-white transition duration-150 ease-in-out bg-gradient-to-br from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500'
          : 'nav-link group flex items-center rounded-md px-3 py-2.5 text-sm font-medium text-gray-300 transition duration-150 ease-in-out hover:bg-gray-700 hover:text-white';
      });
    });
  });
}

function showView(view) {
  currentView = view;
  document.getElementById('page-title').textContent = view === 'queue' ? 'Queue' : 'Settings';
  if (view === 'queue') { renderQueue(); startQueuePolling(); }
  else { stopQueuePolling(); renderSettings(); }

  document.getElementById('nav').querySelectorAll('.nav-link').forEach(l => {
    const isActive = l.dataset.view === view;
    l.className = isActive
      ? 'nav-link group flex items-center rounded-md px-3 py-2.5 text-sm font-medium text-white transition duration-150 ease-in-out bg-gradient-to-br from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500'
      : 'nav-link group flex items-center rounded-md px-3 py-2.5 text-sm font-medium text-gray-300 transition duration-150 ease-in-out hover:bg-gray-700 hover:text-white';
  });
}

// === Auth ===
function showAuthModal() {
  document.getElementById('auth-modal').classList.remove('hidden');
  document.getElementById('auth-modal').classList.add('flex');
  document.getElementById('auth-error').classList.add('hidden');
}

function hideAuthModal() {
  document.getElementById('auth-modal').classList.add('hidden');
  document.getElementById('auth-modal').classList.remove('flex');
}

async function authenticate() {
  const key = document.getElementById('auth-key-input').value.trim();
  if (!key) return;
  try {
    const r = await fetch('/api/v1/settings', { headers: { Authorization: `Bearer ${key}` } });
    if (!r.ok) throw new Error('Invalid key');
    apiKey = key;
    localStorage.setItem('friendarr_key', key);
    updateAuthUI(true);
    hideAuthModal();
    if (currentView === 'queue') { renderQueue(); startQueuePolling(); }
    else { renderSettings(); }
  } catch {
    document.getElementById('auth-error').classList.remove('hidden');
    document.getElementById('auth-error').textContent = 'Invalid API key. Use your master API key.';
  }
}

function logout() {
  apiKey = '';
  localStorage.removeItem('friendarr_key');
  updateAuthUI(false);
  stopQueuePolling();
  document.getElementById('content').innerHTML = '<div class="text-gray-400 text-sm">Authenticate to continue.</div>';
}

function updateAuthUI(authed) {
  const status = document.getElementById('auth-status');
  const btn = document.getElementById('auth-btn');
  if (authed) {
    status.innerHTML = '<div class="text-xs text-green-400">Authenticated</div>';
    btn.innerHTML = '<svg class="icon-sm mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>Logout';
    btn.onclick = logout;
  } else {
    status.innerHTML = '<div class="text-xs text-gray-500">Not authenticated</div>';
    btn.innerHTML = '<svg class="icon-sm mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>Authenticate';
    btn.onclick = showAuthModal;
  }
}

function authHeaders() {
  return apiKey ? { Authorization: `Bearer ${apiKey}`, 'Content-Type': 'application/json' } : {};
}

// === Queue ===
function startQueuePolling() {
  stopQueuePolling();
  queueTimer = setInterval(renderQueue, 3000);
}

function stopQueuePolling() {
  if (queueTimer) { clearInterval(queueTimer); queueTimer = null; }
}

function formatBytes(bytes) {
  if (!bytes || bytes === 0) return '—';
  const units = ['B','KB','MB','GB','TB'];
  let i = 0;
  let b = bytes;
  while (b >= 1024 && i < units.length - 1) { b /= 1024; i++; }
  return `${b.toFixed(i > 0 ? 1 : 0)} ${units[i]}`;
}

function formatDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleString();
}

function statusBadge(status) {
  const colors = {
    queued: 'bg-gray-600 text-gray-200',
    downloading: 'bg-indigo-500/80 text-indigo-100 border border-indigo-500',
    complete: 'bg-green-500/80 text-green-100 border border-green-500',
    failed: 'bg-red-600/80 text-red-100 border border-red-500',
  };
  return `<span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-semibold ${colors[status] || ''}">${status}</span>`;
}

async function renderQueue() {
  if (!apiKey) {
    document.getElementById('content').innerHTML = '<div class="text-gray-400 text-sm">Authenticate to view the queue.</div>';
    return;
  }
  try {
    const r = await fetch('/api/v1/queue', { headers: authHeaders() });
    if (!r.ok) { document.getElementById('content').innerHTML = '<div class="text-red-400 text-sm">Failed to load queue.</div>'; return; }
    const data = await r.json();
    const jobs = data.jobs || [];
    const globalPaused = data.globalPaused;

    const counts = { queued: 0, downloading: 0, complete: 0, failed: 0 };
    jobs.forEach(j => { if (counts[j.status] !== undefined) counts[j.status]++; });

    let html = '';

    // Stats bar
    html += `<div class="flex flex-wrap items-center gap-3 mb-4">`;
    html += `<span class="inline-flex items-center rounded-full px-3 py-1 text-xs font-semibold bg-gray-600 text-gray-200">${counts.queued} queued</span>`;
    html += `<span class="inline-flex items-center rounded-full px-3 py-1 text-xs font-semibold bg-indigo-500/80 text-indigo-100 border border-indigo-500">${counts.downloading} downloading</span>`;
    html += `<span class="inline-flex items-center rounded-full px-3 py-1 text-xs font-semibold bg-green-500/80 text-green-100 border border-green-500">${counts.complete} complete</span>`;
    html += `<span class="inline-flex items-center rounded-full px-3 py-1 text-xs font-semibold bg-red-600/80 text-red-100 border border-red-500">${counts.failed} failed</span>`;
    html += `<span class="flex-1"></span>`;
    if (globalPaused) {
      html += `<button onclick="resumeAll()" class="btn-primary btn-sm">Resume All</button>`;
    } else {
      html += `<button onclick="pauseAll()" class="btn-ghost btn-sm">Pause All</button>`;
    }
    html += `<button onclick="clearCompleted()" class="btn-ghost btn-sm">Clear Finished</button>`;
    html += `</div>`;

    if (globalPaused) {
      html += `<div class="mb-4 rounded-md border border-yellow-500 bg-yellow-500/20 px-3 py-2 text-sm text-yellow-200">Queue is globally paused.</div>`;
    }

    // Table
    if (jobs.length === 0) {
      html += `<div class="text-gray-400 text-sm py-8 text-center">No downloads in queue.</div>`;
    } else {
      html += `<div class="overflow-hidden rounded-lg ring-1 ring-gray-700"><table class="min-w-full"><thead>`;
      html += `<tr><th class="px-4 py-3 bg-gray-700 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">Title</th><th class="px-4 py-3 bg-gray-700 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">Type</th><th class="px-4 py-3 bg-gray-700 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">Status</th><th class="px-4 py-3 bg-gray-700 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">Size</th><th class="px-4 py-3 bg-gray-700 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">Created</th><th class="px-4 py-3 bg-gray-700 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">Actions</th></tr></thead><tbody class="divide-y divide-gray-700 bg-gray-800">`;
      for (const job of jobs) {
        const progress = job.totalBytes ? Math.round((job.bytesDownloaded / job.totalBytes) * 100) : 0;
        html += `<tr>`;
        html += `<td class="px-4 py-3 text-sm text-white">${esc(job.request.destination.title)}</td>`;
        html += `<td class="px-4 py-3 text-sm text-gray-300">${esc(job.request.source.type)}</td>`;
        html += `<td class="px-4 py-3">${statusBadge(job.status)}${job.status === 'failed' ? `<div class="text-xs text-red-400 mt-1">${esc(job.error || '')}</div>` : ''}</td>`;
        html += `<td class="px-4 py-3 text-sm text-gray-300">${job.totalBytes ? `${formatBytes(job.bytesDownloaded)} / ${formatBytes(job.totalBytes)}` : '—'}${job.status === 'downloading' && job.totalBytes ? `<div class="mt-1 w-full bg-gray-700 rounded-full h-1.5"><div class="bg-indigo-500 h-1.5 rounded-full" style="width:${progress}%"></div></div>` : ''}</td>`;
        html += `<td class="px-4 py-3 text-sm text-gray-400">${formatDate(job.createdAt)}</td>`;
        html += `<td class="px-4 py-3">`;
        if (job.status === 'queued' || job.status === 'downloading') {
          html += `<button onclick="cancelJob('${job.id}')" class="btn-danger btn-xs mr-1">Cancel</button>`;
          html += `<button onclick="pauseJob('${job.id}')" class="btn-ghost btn-xs">Pause</button>`;
        }
        html += `</td>`;
        html += `</tr>`;
      }
      html += `</tbody></table></div>`;
    }

    document.getElementById('content').innerHTML = html;
  } catch {
    document.getElementById('content').innerHTML = '<div class="text-red-400 text-sm">Failed to load queue.</div>';
  }
}

async function pauseAll() { await fetch('/api/v1/queue/pause-all', { method: 'POST', headers: authHeaders() }); renderQueue(); }
async function resumeAll() { await fetch('/api/v1/queue/resume-all', { method: 'POST', headers: authHeaders() }); renderQueue(); }
async function clearCompleted() { await fetch('/api/v1/queue', { method: 'DELETE', headers: authHeaders() }); renderQueue(); }
async function cancelJob(id) { await fetch(`/api/v1/queue/${id}`, { method: 'DELETE', headers: authHeaders() }); renderQueue(); }
async function pauseJob(id) { await fetch(`/api/v1/queue/${id}/pause`, { method: 'POST', headers: authHeaders() }); renderQueue(); }
async function resumeJob(id) { await fetch(`/api/v1/queue/${id}/resume`, { method: 'POST', headers: authHeaders() }); renderQueue(); }

// === Settings ===
async function renderSettings() {
  if (!apiKey) {
    document.getElementById('content').innerHTML = '<div class="text-gray-400 text-sm">Authenticate to manage settings.</div>';
    return;
  }
  try {
    const r = await fetch('/api/v1/settings', { headers: authHeaders() });
    if (!r.ok) { document.getElementById('content').innerHTML = '<div class="text-red-400 text-sm">Failed to load settings.</div>'; return; }
    settingsData = await r.json();
  } catch {
    document.getElementById('content').innerHTML = '<div class="text-red-400 text-sm">Failed to load settings.</div>';
    return;
  }

  let html = '';

  // Limits section
  html += renderLimitsSection();
  // API Keys section
  html += '<div class="mt-10">';
  html += await renderApiKeysSection();
  html += '</div>';
  // Source Endpoints section
  html += '<div class="mt-10">';
  html += renderSourceEndpointsSection();
  html += '</div>';
  // Schedules section
  html += '<div class="mt-10">';
  html += renderSchedulesSection();
  html += '</div>';

  document.getElementById('content').innerHTML = html;
}

function renderLimitsSection() {
  return `<div class="rounded-lg border border-gray-700 bg-gray-800 p-6">
    <h3 class="text-brand text-lg font-bold mb-2">Limits</h3>
    <p class="text-sm text-gray-400 mb-4">Control download concurrency and bandwidth.</p>
    <div class="grid grid-cols-2 gap-6">
      <div>
        <label class="block text-sm font-medium text-gray-400 mb-1">Max Concurrent Downloads</label>
        <input type="number" id="s-max-concurrent" value="${settingsData.maxConcurrentDownloads}" min="1" max="50" class="w-24" onchange="saveLimits()">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-400 mb-1">Max Bandwidth (bytes/sec, 0 = unlimited)</label>
        <input type="number" id="s-max-bandwidth" value="${settingsData.maxBandwidth}" min="0" class="w-48" onchange="saveLimits()">
      </div>
    </div>
  </div>`;
}

async function saveLimits() {
  const maxConcurrentDownloads = parseInt(document.getElementById('s-max-concurrent').value) || 2;
  const maxBandwidth = parseInt(document.getElementById('s-max-bandwidth').value) || 0;
  try {
    await fetch('/api/v1/settings', {
      method: 'PUT',
      headers: authHeaders(),
      body: JSON.stringify({ maxConcurrentDownloads, maxBandwidth }),
    });
  } catch {}
}

async function renderApiKeysSection() {
  let inner = `<div class="rounded-lg border border-gray-700 bg-gray-800 p-6">
    <h3 class="text-brand text-lg font-bold mb-2">API Keys</h3>
    <p class="text-sm text-gray-400 mb-4">Manage API keys for external services to submit downloads.</p>`;
  try {
    const r = await fetch('/api/v1/api-keys', { headers: authHeaders() });
    const data = await r.json();
    const keys = data.keys || [];
    if (keys.length > 0) {
      inner += `<div class="mb-4 space-y-2">`;
      for (const k of keys) {
        inner += `<div class="flex items-center justify-between rounded-md bg-gray-700 px-4 py-2"><span class="text-sm text-white font-mono">${esc(k.key)}</span><span class="text-xs text-gray-400">${esc(k.label)}</span><button onclick="deleteApiKey('${esc(k.key)}')" class="btn-danger btn-xs">Revoke</button></div>`;
      }
      inner += `</div>`;
    }
  } catch {}
  inner += `<div class="flex gap-2 items-end">
    <div><label class="block text-xs text-gray-400 mb-1">Label</label><input type="text" id="new-key-label" placeholder="e.g. Seerr instance" class="w-48"></div>
    <button onclick="createApiKey()" class="btn-primary">Create Key</button>
  </div>`;
  inner += `<div id="api-key-result" class="mt-3 hidden rounded-md border border-yellow-500 bg-yellow-500/20 px-3 py-2 text-sm text-yellow-200"></div>`;
  inner += `</div>`;
  return inner;
}

async function createApiKey() {
  const label = document.getElementById('new-key-label').value.trim();
  if (!label) return;
  try {
    const r = await fetch('/api/v1/api-keys', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ label }),
    });
    const data = await r.json();
    const el = document.getElementById('api-key-result');
    el.classList.remove('hidden');
    el.textContent = `New key: ${data.apiKey} — copy it now, it won't be shown again.`;
    setTimeout(() => renderSettings(), 500);
  } catch {}
}

async function deleteApiKey(key) {
  await fetch(`/api/v1/api-keys/${key}`, { method: 'DELETE', headers: authHeaders() });
  renderSettings();
}

function renderSourceEndpointsSection() {
  const eps = settingsData.sourceEndpoints || [];
  let inner = `<div class="rounded-lg border border-gray-700 bg-gray-800 p-6">
    <h3 class="text-brand text-lg font-bold mb-2">Source Endpoints</h3>
    <p class="text-sm text-gray-400 mb-4">Pre-configured source servers for quick download submission.</p>`;
  if (eps.length > 0) {
    inner += `<div class="mb-4 space-y-2">`;
    for (const ep of eps) {
      inner += `<div class="flex items-center justify-between rounded-md bg-gray-700 px-4 py-2"><div><span class="text-sm text-white">${esc(ep.label)}</span><span class="ml-2 text-xs text-gray-400">${esc(ep.type)} — ${esc(ep.url)}</span></div><button onclick="deleteEndpoint('${ep.id}')" class="btn-danger btn-xs">Remove</button></div>`;
    }
    inner += `</div>`;
  }
  inner += `<div class="grid grid-cols-2 gap-3 mb-3">
    <div><label class="block text-xs text-gray-400 mb-1">Label</label><input type="text" id="ep-label" placeholder="My Server" class="w-full"></div>
    <div><label class="block text-xs text-gray-400 mb-1">Type</label><select id="ep-type" class="w-full"><option value="seerr">Seerr</option><option value="plex">Plex</option><option value="emby">Emby</option><option value="jellyfin">Jellyfin</option></select></div>
    <div><label class="block text-xs text-gray-400 mb-1">URL</label><input type="text" id="ep-url" placeholder="https://server.example.com" class="w-full"></div>
    <div><label class="block text-xs text-gray-400 mb-1">Auth Token</label><input type="text" id="ep-token" placeholder="API key or token" class="w-full"></div>
  </div>
  <button onclick="addEndpoint()" class="btn-primary">Add Endpoint</button>`;
  inner += `</div>`;
  return inner;
}

async function addEndpoint() {
  const label = document.getElementById('ep-label').value.trim();
  const type = document.getElementById('ep-type').value;
  const url = document.getElementById('ep-url').value.trim();
  const authToken = document.getElementById('ep-token').value.trim();
  if (!label || !url) return;
  const eps = [...(settingsData.sourceEndpoints || [])];
  eps.push({ id: crypto.randomUUID(), type, url, authToken, label });
  settingsData = await saveSettings({ sourceEndpoints: eps });
  renderSettings();
}

async function deleteEndpoint(id) {
  const eps = (settingsData.sourceEndpoints || []).filter(e => e.id !== id);
  settingsData = await saveSettings({ sourceEndpoints: eps });
  renderSettings();
}

function renderSchedulesSection() {
  const schedules = settingsData.schedules || [];
  const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  let inner = `<div class="rounded-lg border border-gray-700 bg-gray-800 p-6">
    <h3 class="text-brand text-lg font-bold mb-2">Schedules</h3>
    <p class="text-sm text-gray-400 mb-4">Restrict downloads to specific time windows. If no schedules are set, downloads run at any time.</p>`;
  if (schedules.length > 0) {
    inner += `<div class="mb-4 space-y-3">`;
    schedules.forEach((s, i) => {
      const dayStr = s.days.map(d => dayNames[d]).join(', ');
      const winStr = s.windows.map(w => `${w.start} – ${w.end}`).join(', ');
      inner += `<div class="flex items-center justify-between rounded-md bg-gray-700 px-4 py-2"><div><span class="text-sm text-white">${dayStr}</span><span class="ml-2 text-xs text-gray-400">${winStr}</span></div><button onclick="deleteSchedule(${i})" class="btn-danger btn-xs">Remove</button></div>`;
    });
    inner += `</div>`;
  }
  inner += `<div class="border-t border-gray-700 pt-4 mt-4">
    <p class="text-sm font-medium text-gray-300 mb-2">Add Schedule</p>
    <div class="flex flex-wrap gap-2 mb-3" id="sched-days">
      ${dayNames.map((d, i) => `<label class="flex items-center gap-1 text-xs text-gray-400"><input type="checkbox" value="${i}" class="sched-day w-4 h-4">${d}</label>`).join('')}
    </div>
    <div class="flex gap-3 items-end mb-3">
      <div><label class="block text-xs text-gray-400 mb-1">Start</label><input type="text" id="sched-start" placeholder="HH:MM" class="w-24"></div>
      <div><label class="block text-xs text-gray-400 mb-1">End</label><input type="text" id="sched-end" placeholder="HH:MM" class="w-24"></div>
      <button onclick="addScheduleWindow()" class="btn-ghost btn-sm">Add Window</button>
    </div>
    <div id="sched-windows" class="mb-3 space-y-1"></div>
    <button onclick="saveSchedule()" class="btn-primary">Save Schedule</button>
  </div>`;
  inner += `</div>`;
  return inner;
}

const pendingWindows = [];

function addScheduleWindow() {
  const start = document.getElementById('sched-start').value.trim();
  const end = document.getElementById('sched-end').value.trim();
  if (!start || !end) return;
  pendingWindows.push({ start, end });
  document.getElementById('sched-start').value = '';
  document.getElementById('sched-end').value = '';
  renderPendingWindows();
}

function renderPendingWindows() {
  const el = document.getElementById('sched-windows');
  el.innerHTML = pendingWindows.map((w, i) =>
    `<div class="flex items-center justify-between rounded bg-gray-700 px-3 py-1 text-xs text-white">${w.start} – ${w.end} <button onclick="removePendingWindow(${i})" class="text-red-400 hover:text-red-300 ml-2">&times;</button></div>`
  ).join('');
}

function removePendingWindow(i) { pendingWindows.splice(i, 1); renderPendingWindows(); }

async function saveSchedule() {
  const days = Array.from(document.querySelectorAll('.sched-day:checked')).map(cb => parseInt(cb.value));
  if (days.length === 0 || pendingWindows.length === 0) return;
  const schedules = [...(settingsData.schedules || [])];
  schedules.push({ days, windows: [...pendingWindows] });
  pendingWindows.length = 0;
  settingsData = await saveSettings({ schedules });
  renderSettings();
}

async function deleteSchedule(i) {
  const schedules = (settingsData.schedules || []).filter((_, idx) => idx !== i);
  settingsData = await saveSettings({ schedules });
  renderSettings();
}

async function saveSettings(partial) {
  try {
    const r = await fetch('/api/v1/settings', {
      method: 'PUT',
      headers: authHeaders(),
      body: JSON.stringify(partial),
    });
    const data = await r.json();
    return data;
  } catch { return settingsData; }
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>
</body>
